# frontend/nginx.conf

server {
    listen 80;
    
    root /usr/share/nginx/html;
    index index.html;

    # The critical SPA configuration:
    # Try to serve the file, if not found, serve index.html
    # This lets React Router handle /dashboard, /login, etc.
    # Without "try_files", refreshing on /dashboard returns 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively — they have hashed filenames so they're immutable
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}